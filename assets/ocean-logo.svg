    <circle cx="150" cy="150" r="78" fill="none" stroke="#f4fcff" stroke-width="7"/>
    <circle cx="150" cy="150" r="49" fill="none" stroke="#dff3f8" stroke-width="6"/>

    <path d="M63 173c23-14 45-14 67-2 18 10 36 10 56 0 22-12 44-12 67 2" fill="none" stroke="#f2fdff" stroke-width="15" stroke-linecap="round"/>
    <path d="M67 202c22-12 43-12 65-1 23 12 42 12 64 0 21-11 42-11 64 1" fill="none" stroke="#9edee9" stroke-width="11" stroke-linecap="round"/>
    <path d="M61 188c26-10 48-9 70 2 18 10 36 10 57 0 21-10 43-10 66 2-16 33-54 55-103 55-50 0-89-22-105-56 5 0 10-1 15-3z" fill="url(#water)"/>

    <path d="M150 66l15 66 58 18-58 18-15 66-15-66-58-18 58-18z" fill="#ffffff" stroke="#f2fbff" stroke-width="4"/>
    <path d="M150 66l15 66 58 18-58 18z" fill="#69b6cf"/>
    <path d="M150 234l-15-66-58-18 58-18z" fill="#2d719d"/>
    <circle cx="150" cy="150" r="14" fill="#fbfdfe" stroke="#3f7f9f" stroke-width="6"/>

    <path d="M119 213l31-82 37 82z" fill="url(#ice)" stroke="#ffffff" stroke-width="7" stroke-linejoin="round"/>
    <path d="M150 131l-5 82h-26z" fill="#ffffff"/>
    <path d="M150 131l37 82h-42z" fill="#9bd3e3"/>
    <path d="M133 177l13 36h-27z" fill="#6db6d0"/>
