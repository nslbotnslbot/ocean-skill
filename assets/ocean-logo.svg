<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">OCEAN logo</title>
  <desc id="desc">A soft ocean-blue logo with a compass, wave, and iceberg symbol beside the OCEAN wordmark and full project name.</desc>
  <defs>
    <linearGradient id="mark-bg" x1="52" y1="28" x2="208" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef9fb"/>
      <stop offset="0.48" stop-color="#b8e2ee"/>
      <stop offset="1" stop-color="#5c9fbd"/>
    </linearGradient>
    <linearGradient id="mark-water" x1="44" y1="132" x2="216" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#84cddd"/>
      <stop offset="1" stop-color="#2f6f9d"/>
    </linearGradient>
    <linearGradient id="mark-ice" x1="116" y1="84" x2="154" y2="183" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#d9f0f6"/>
      <stop offset="1" stop-color="#8fc6da"/>
    </linearGradient>
    <filter id="logo-shadow" x="-12%" y="-16%" width="124%" height="132%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#4b7891" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="920" height="260" rx="42" fill="#fbfdfe"/>

  <g filter="url(#logo-shadow)">
    <circle cx="130" cy="130" r="92" fill="url(#mark-bg)"/>
    <circle cx="130" cy="130" r="82" fill="none" stroke="#f6fcff" stroke-width="7"/>
    <circle cx="130" cy="130" r="50" fill="none" stroke="#e4f5fa" stroke-width="5" opacity="0.9"/>

    <path d="M44 150c21-15 43-16 64-4 18 10 36 10 56 0 21-11 42-10 62 4" fill="none" stroke="#e8fbff" stroke-width="15" stroke-linecap="round"/>
    <path d="M48 178c20-13 41-13 61-2 22 12 42 12 63 0 20-11 40-11 60 2" fill="none" stroke="#a8e4ef" stroke-width="10" stroke-linecap="round"/>
    <path d="M46 164c25-11 45-10 66 2 17 10 34 10 54 0 20-10 39-10 61 2-14 34-50 57-96 57-47 0-83-24-97-59 4 0 8-1 12-2z" fill="url(#mark-water)" opacity="0.7"/>

    <path d="M130 52l13 58 50 20-50 20-13 58-13-58-50-20 50-20z" fill="#ffffff" opacity="0.82"/>
    <path d="M130 52l13 58 50 20-50 20z" fill="#6fb7cf" opacity="0.86"/>
    <path d="M130 208l-13-58-50-20 50-20z" fill="#346f99" opacity="0.78"/>
    <circle cx="130" cy="130" r="13" fill="#fbfdfe" stroke="#4a85a6" stroke-width="5"/>

    <path d="M103 181l27-70 33 70z" fill="url(#mark-ice)" stroke="#f7fdff" stroke-width="6" stroke-linejoin="round"/>
    <path d="M130 111l-4 70h-23z" fill="#ffffff" opacity="0.65"/>
    <path d="M130 111l33 70h-37z" fill="#9bd2e1" opacity="0.68"/>
  </g>

  <g fill="#123c5a">
    <text x="268" y="124" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="76" font-weight="750" letter-spacing="4">OCEAN</text>
    <text x="272" y="169" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="28" font-weight="560" letter-spacing="0" fill="#35657d">Orchestrated Claim-Evidence Analysis Navigator</text>
  </g>
</svg>
