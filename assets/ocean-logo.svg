  <g fill="#123c5a">
    <text x="292" y="123" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="78" font-weight="760" letter-spacing="4">OCEAN</text>
    <text x="296" y="173" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="27" font-weight="580" letter-spacing="0" fill="#35657d">Orchestrated Claim-Evidence</text>
    <text x="296" y="210" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="27" font-weight="580" letter-spacing="0" fill="#35657d">Analysis Navigator</text>
