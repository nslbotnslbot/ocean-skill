<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">OCEAN logo</title>
  <desc id="desc">A crisp ocean-blue logo with a compass, wave, and iceberg symbol beside the OCEAN wordmark and two-line project name.</desc>
  <defs>
    <linearGradient id="mark-bg" x1="55" y1="54" x2="230" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef9fb"/>
      <stop offset="0.55" stop-color="#c9eaf2"/>
      <stop offset="1" stop-color="#87bfd1"/>
    </linearGradient>
    <linearGradient id="water" x1="58" y1="162" x2="228" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#83d2df"/>
      <stop offset="1" stop-color="#357fa7"/>
    </linearGradient>
    <linearGradient id="ice" x1="121" y1="102" x2="176" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#d8f0f7"/>
      <stop offset="1" stop-color="#8ec8dd"/>
    </linearGradient>
  </defs>

  <g>
