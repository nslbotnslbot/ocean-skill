name: ocean
display_name: OCEAN
purpose: Claim-evidence navigation and research decision layer for biomedical and biological workflows.

always_load:
  - static/core/stance.md
  - static/core/evidence-boundary.md
  - static/core/routing-protocol.md
  - references/output-contract.md
  - references/manuscript-revision-mode.md

conditional_core:
  retrieval_or_database:
    - static/core/retrieval-separation-gate.md
    - references/data-tool-router.md
    - references/bioinformatics-resource-map.md
    - references/bioinformatics-software-catalog.md
    - references/alphafold-db-adapter.md
    - references/literature-source-adapter.md
    - references/clinicaltrials-adapter.md
    - references/api-database-adapters.md
    - references/bioinformatics-execution-layers.md
    - references/bioinformatics-tool-router.md
    - references/source-packet-schema.md
    - references/tool-adapter-contract.md
  artifacts_or_project_memory:
    - static/core/artifact-ledger.md
    - references/claim-to-artifact-matrix.md
  reproducibility_or_validation:
    - references/reproducibility-gates.md

modules:
  Sounding:
    file: static/modules/sounding.md
    artifact: Source packet, Evidence Radar Map, Negative Space, Handoff Ticket
  Current:
    file: static/modules/current.md
    artifact: Trend Map, Direction-flow Boundary, Consensus-vs-Hype Notes
  Reef:
    file: static/modules/reef.md
    artifact: Resource Provenance Map, Evidence Hierarchy, API/Database Boundary, Source Packet Audit
  Iceberg:
    file: static/modules/iceberg.md
    artifact: Surface Claim, Support Level, Hidden Risk, Downgraded Safe Claim
  Anchor:
    file: static/modules/anchor.md
    artifact: Validation Checklist, Reproducibility Plan, External-check Boundary
  Compass:
    file: static/modules/compass.md
    artifact: Evidence-based Idea Card, Experiment Plan, Strategy Route
  Harbor:
    file: static/modules/harbor.md
    artifact: Decision Memo, Evidence Boundary Ledger, Contribution Boundary Record

scripts:
  source_router: scripts/ocean_source_router.py
  alphafold_db_adapter: scripts/tools/bioinformatics/alphafold_db/source_packet.py
  alphafold_db_adapter_eval: scripts/tools/bioinformatics/alphafold_db/run_eval.py
  literature_source_adapter: scripts/tools/literature/source_packet.py
  clinicaltrials_adapter: scripts/tools/clinicaltrials/source_packet.py
  reef_api_database_adapter: scripts/run_reef_api_adapter.py
  api_database_adapter_eval: scripts/run_api_database_adapter_eval.py
  source_adapters_eval: scripts/tools/run_source_adapter_eval.py
  generic_software_source_packet: scripts/tools/common/software_source_packet.py
  bioinformatics_cli_subprocess_wrapper: scripts/tools/common/cli_subprocess_wrapper.py
  bioinformatics_rscript_wrapper: scripts/tools/common/rscript_wrapper.py
  bioinformatics_heavy_tool_launcher: scripts/tools/common/heavy_tool_launcher.py
  bioinformatics_tool_router: scripts/tools/bioinformatics_tool_router.py
  bioinformatics_tool_router_eval: scripts/tools/run_bioinformatics_tool_router_eval.py
  bioinformatics_tool_scaffold_generator: scripts/tools/generate_bioinformatics_tool_scaffold.py
  bioinformatics_tool_scaffold_eval: scripts/tools/run_bioinformatics_tool_scaffold_eval.py
  bioinformatics_real_tool_smoke_eval: scripts/tools/run_bioinformatics_real_tool_smoke_eval.py
  bioinformatics_execution_layer_eval: scripts/tools/run_bioinformatics_execution_layer_eval.py
  reef_router_eval: scripts/run_reef_router_eval.py
  source_packet_boundary_eval: scripts/run_source_packet_boundary_eval.py
  e2e_module_eval: scripts/run_ocean_e2e_eval.py
  seven_module_coordination_eval: scripts/run_ocean_coordination_eval.py

evals:
  alphafold_db_adapter_r1: evals/afdb-adapter-r1-mock-metadata.json
  literature_adapter_r1: evals/literature-adapter-r1-mock-record.json
  clinicaltrials_adapter_r1: evals/clinicaltrials-adapter-r1-mock-study.json
  ocean_e2e_module_router_r1: evals/ocean-e2e-module-router-r1-cases.json
  reef_bioinformatics_router_r2: evals/reef-bioinformatics-router-r2-cases.json
  reef_bioinformatics_router_r3: evals/reef-bioinformatics-router-r3-cases.json
  reef_bioinformatics_router_r4: evals/reef-bioinformatics-router-r4-cases.json
  bioinformatics_tool_scaffold_r1: evals/bioinformatics-tool-scaffold-r1-summary.json
  bioinformatics_real_tool_smoke_r1: evals/bioinformatics-real-tool-smoke-r1-summary.json
  bioinformatics_execution_layer_r1: evals/bioinformatics-execution-layer-r1-summary.json
  bioinformatics_tool_router_r1: evals/bioinformatics-tool-router-r1-summary.json
  api_database_adapter_r1_dry_run: evals/api-database-adapter-r1-dry-run-summary.json
  api_database_adapter_r1_live: evals/api-database-adapter-r1-live-summary.json
  source_packet_boundary_r2: evals/source-packet-boundary-r2-cases.json
