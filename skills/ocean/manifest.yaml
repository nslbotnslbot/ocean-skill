name: ocean
display_name: OCEAN
purpose: Claim-evidence navigation and research decision layer for biomedical and biological workflows.

always_load:
  - static/core/stance.md
  - static/core/evidence-boundary.md
  - static/core/routing-protocol.md
  - references/output-contract.md

conditional_core:
  retrieval_or_database:
    - static/core/retrieval-separation-gate.md
    - references/data-tool-router.md
    - references/bioinformatics-resource-map.md
    - references/alphafold-db-adapter.md
    - references/source-packet-schema.md
    - references/tool-adapter-contract.md
  artifacts_or_project_memory:
    - static/core/artifact-ledger.md
    - references/claim-to-artifact-matrix.md
  reproducibility_or_validation:
    - references/reproducibility-gates.md

modules:
  Sounding:
    file: static/modules/sounding.md
    artifact: Source packet, Evidence Radar Map, Negative Space, Handoff Ticket
  Current:
    file: static/modules/current.md
    artifact: Trend Map, Direction-flow Boundary, Consensus-vs-Hype Notes
  Reef:
    file: static/modules/reef.md
    artifact: Resource Provenance Map, Evidence Hierarchy, API/Database Boundary, Source Packet Audit
  Iceberg:
    file: static/modules/iceberg.md
    artifact: Surface Claim, Support Level, Hidden Risk, Downgraded Safe Claim
  Anchor:
    file: static/modules/anchor.md
    artifact: Validation Checklist, Reproducibility Plan, External-check Boundary
  Compass:
    file: static/modules/compass.md
    artifact: Evidence-based Idea Card, Experiment Plan, Strategy Route
  Harbor:
    file: static/modules/harbor.md
    artifact: Decision Memo, Evidence Boundary Ledger, Contribution Boundary Record

scripts:
  source_router: scripts/ocean_source_router.py
  alphafold_db_adapter: scripts/afdb_source_packet.py
  alphafold_db_adapter_eval: scripts/run_afdb_adapter_eval.py
  reef_router_eval: scripts/run_reef_router_eval.py
  source_packet_boundary_eval: scripts/run_source_packet_boundary_eval.py
  e2e_module_eval: scripts/run_ocean_e2e_eval.py

evals:
  alphafold_db_adapter_r1: evals/afdb-adapter-r1-mock-metadata.json
  ocean_e2e_module_router_r1: evals/ocean-e2e-module-router-r1-cases.json
  reef_bioinformatics_router_r2: evals/reef-bioinformatics-router-r2-cases.json
  reef_bioinformatics_router_r3: evals/reef-bioinformatics-router-r3-cases.json
  source_packet_boundary_r2: evals/source-packet-boundary-r2-cases.json
